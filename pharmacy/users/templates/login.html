{% extends 'base.html' %}
{% block content %}
    <h1>Вход в систему</h1>

    {% if form.errors %}
        <p>Неверное имя пользователя или пароль.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <hr>
    <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
{% endblock %}
