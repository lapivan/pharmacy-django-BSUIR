{% extends 'base.html' %}
{% block content %}
<h1>{% if form.instance.pk %}Редактировать{% else %}Добавить{% endif %} новость</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'news_list' %}">Отмена</a>
{% endblock %}
