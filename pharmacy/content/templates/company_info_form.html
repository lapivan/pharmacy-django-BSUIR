{% extends 'base.html' %}
{% block content %}
    <h1>Редактировать информацию о компании</h1>

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Обновить</button>
    </form>
    <a href="{% url 'company_info' %}">Назад</a>
{% endblock %}
